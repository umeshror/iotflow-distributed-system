global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "iotflow-ingestion"
    static_configs:
      - targets: ["ingestion:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "iotflow-worker"
    static_configs:
      - targets: ["worker:9101"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
