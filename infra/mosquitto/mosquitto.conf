# Mosquitto MQTT Broker Configuration for IoTFlow
# For production: enable TLS listener and disable anonymous access

# Plain TCP listener (development only)
listener 1883
allow_anonymous true

# WebSocket listener
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all

# Connection limits (tune for production scale)
max_connections 100000
max_inflight_messages 1000
max_queued_messages 5000
max_packet_size 65536
